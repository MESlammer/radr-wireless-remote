name: Release Latest as Alpha

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-alpha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy latest to alpha
        run: |
          rm -rf ./docs/alpha/*
          cp -r ./docs/v/latest/* ./docs/alpha/

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(jq -r .version ./docs/v/latest/version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Release Alpha v${{ steps.get_version.outputs.version }}"
          title: "Release Alpha v${{ steps.get_version.outputs.version }}"
          body: "Promotes latest build to alpha channel"
          branch: "auto/release-alpha-${{ steps.get_version.outputs.version }}"
          base: master
          delete-branch: true

      - name: Enable Auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
