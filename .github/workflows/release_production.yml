name: Release Alpha as Production

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy alpha to production
        run: |
          rm -rf ./docs/production/*
          cp -r ./docs/alpha/* ./docs/production/
          cp ./docs/alpha/version.json ./docs/version.json

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(jq -r .version ./docs/alpha/version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Release Production v${{ steps.get_version.outputs.version }}"
          title: "Release Production v${{ steps.get_version.outputs.version }}"
          body: "Promotes alpha to production channel"
          branch: "auto/release-production-${{ steps.get_version.outputs.version }}"
          base: master
          delete-branch: true

      - name: Enable Auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
